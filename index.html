<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="My favourite restaurants around the world — search by city and discover must-try dishes">
  <link rel="icon" href="data:,">
  <title>My Restaurants</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <nav class="tab-nav" role="tablist">
      <button class="tab-btn active" data-tab="explore" role="tab" aria-selected="true"><img src="images/space-exploration.png" class="tab-icon" alt=""> <span data-i18n="tabExplore"></span></button>
      <button class="tab-btn" data-tab="favourites" role="tab" aria-selected="false"><img src="images/favorite.png" class="tab-icon" alt=""> <span data-i18n="tabFavourites"></span></button>
    </nav>

    <!-- Language switcher — top right -->
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="en" title="English" aria-label="Switch to English">🇬🇧</button>
      <button class="lang-btn" data-lang="es" title="Español" aria-label="Cambiar a español">🇪🇸</button>
    </div>

    <div class="header-inner">
      <h1 class="site-title"><span data-i18n="title"></span></h1>
      <p class="site-tagline" data-i18n="tagline"></p>
      <div id="panel-explore-search">
        <div class="search-container">
          <input
            type="search"
            id="search-input"
            class="search-input"
            autocomplete="off"
            spellcheck="false"
          >
          <button class="search-btn" aria-label="Search"><img src="images/magnifying-glass.png" class="search-btn-icon" alt=""></button>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div id="panel-favourites" style="display:none"></div>
    <div id="result-count" class="result-count" hidden></div>

    <div id="hero-state" class="hero-state">
      <span class="hero-emoji">🗺️</span>
      <p class="hero-text" data-i18n="heroText"></p>
    </div>

    <div id="empty-state" class="empty-state" hidden>
      <span class="empty-emoji">🔍</span>
      <p class="empty-text"><span data-i18n="emptyBefore"></span>"<span id="empty-query"></span>"<span data-i18n="emptyAfter"></span></p>
      <p class="empty-hint" data-i18n="emptyHint"></p>
    </div>

    <div id="cards-container" class="cards-grid"></div>
  </main>

  <footer class="site-footer">
    <p data-i18n="footer"></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5/papaparse.min.js"></script>
  <script src="script.js"></script>
</body>
</html>

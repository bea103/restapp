<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mis restaurantes favoritos del mundo — busca por ciudad y descubre los platos imprescindibles">
  <link rel="icon" href="data:,">
  <title>Mis Restaurantes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <h1 class="site-title">🍽️ Mis Restaurantes</h1>
      <p class="site-tagline">Descubre los mejores restaurantes del mundo y sus platos imprescindibles</p>
      <div class="search-container">
        <span class="search-icon">🔍</span>
        <input
          type="search"
          id="search-input"
          class="search-input"
          placeholder="Busca por ciudad... (ej: Sevilla, Paris, Tokyo)"
          autocomplete="off"
          spellcheck="false"
        >
      </div>
    </div>
  </header>

  <main class="main-content">
    <div id="result-count" class="result-count" hidden></div>

    <div id="hero-state" class="hero-state">
      <span class="hero-emoji">🗺️</span>
      <p class="hero-text">Busca una ciudad para empezar a descubrir</p>
    </div>

    <div id="empty-state" class="empty-state" hidden>
      <span class="empty-emoji">🔍</span>
      <p class="empty-text">No se encontraron restaurantes en "<span id="empty-query"></span>".</p>
      <p class="empty-hint">Prueba con otra ciudad.</p>
    </div>

    <div id="cards-container" class="cards-grid"></div>
  </main>

  <footer class="site-footer">
    <p>Hecho con ❤️ · Actualizado desde Notion</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5/papaparse.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
